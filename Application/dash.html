<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA-NAHA · Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080f07;--bg2:#0f1a0e;--bg3:#152012;
    --green:#7ecb5a;--green2:#4a9e2a;--green3:#2d6618;
    --muted:#5a7a52;--text:#ddecd7;--text2:#a8c99e;
    --border:rgba(126,203,90,0.15);--border2:rgba(126,203,90,0.35);
    --card:rgba(255,255,255,0.03);
    --prot:#4ade80;--gluc:#facc15;--lip:#f97316;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:0;}
  .orb{position:fixed;border-radius:50%;filter:blur(120px);pointer-events:none;z-index:0;}
  .orb-1{width:500px;height:500px;top:-100px;right:-100px;background:rgba(74,158,42,0.07);}
  .orb-2{width:350px;height:350px;bottom:-50px;left:-50px;background:rgba(45,102,24,0.05);}

  .wrap{max-width:1200px;margin:0 auto;padding:2.5rem 1.5rem;position:relative;z-index:1;}

  /* Nav */
  .topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:2.5rem;}
  .logo{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;color:var(--green);letter-spacing:2px;}
  .topbar a{font-size:0.75rem;color:var(--muted);text-decoration:none;border:1px solid var(--border);border-radius:100px;padding:6px 16px;transition:all 0.2s;}
  .topbar a:hover{color:var(--green);border-color:var(--border2);}

  /* Header */
  .page-header{margin-bottom:2.5rem;animation:fadeUp 0.5s ease both;}
  .badge{display:inline-flex;align-items:center;gap:8px;background:rgba(126,203,90,0.08);border:1px solid var(--border2);border-radius:100px;padding:5px 16px;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--green);margin-bottom:1rem;}
  .badge::before{content:'◆';font-size:8px;}
  h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4vw,3rem);font-weight:300;color:#f0f8ee;letter-spacing:-0.5px;}
  h1 em{font-style:italic;color:var(--green);}

  /* Layout */
  .layout{display:grid;grid-template-columns:320px 1fr;gap:1.5rem;align-items:start;}

  /* Card */
  .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:1.5rem;transition:border-color 0.2s;}
  .card:hover{border-color:rgba(126,203,90,0.25);}
  .sec-title{font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--green);margin-bottom:1.2rem;display:flex;align-items:center;gap:8px;}
  .sec-title::after{content:'';flex:1;height:1px;background:var(--border);}

  /* Plan list */
  .plan-item{border:1px solid var(--border);border-radius:14px;padding:1rem;margin-bottom:0.7rem;cursor:pointer;transition:all 0.2s;background:rgba(255,255,255,0.02);}
  .plan-item:hover,.plan-item.active{background:rgba(126,203,90,0.08);border-color:var(--border2);}
  .plan-date{font-size:0.75rem;color:var(--green);margin-bottom:0.5rem;}
  .plan-meta{font-size:0.7rem;color:var(--muted);margin-bottom:0.6rem;}
  .plan-macros{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
  .plan-macro{text-align:center;background:rgba(255,255,255,0.03);border-radius:8px;padding:4px;}
  .plan-macro .v{font-size:0.85rem;font-weight:600;color:var(--text);}
  .plan-macro .l{font-size:7px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);}

  /* Detail panel */
  .detail{display:flex;flex-direction:column;gap:1.2rem;}

  /* Stats cards */
  .stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:0.8rem;}
  .stat-card{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:14px;padding:1rem;text-align:center;}
  .stat-val{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:600;}
  .stat-lbl{font-size:7px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px;}

  /* Charts */
  .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;}

  /* Bar chart */
  .bar-chart{padding:1rem 0;}
  .bars{display:flex;align-items:flex-end;gap:6px;height:120px;padding-bottom:4px;}
  .bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .bar-val{font-size:8px;color:var(--muted);}
  .bar{width:100%;background:linear-gradient(to top,var(--green2),var(--green));border-radius:4px 4px 0 0;min-height:4px;transition:height 0.5s ease;}
  .bar-lbl{font-size:8px;color:var(--muted);}
  .cible-line{font-size:8px;color:#f97316;text-align:center;margin-top:4px;border-top:1px dashed #f97316;padding-top:4px;}

  /* Day tabs */
  .day-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.2rem;}
  .day-tab{padding:5px 14px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:0.75rem;cursor:pointer;transition:all 0.2s;}
  .day-tab:hover{border-color:var(--border2);color:var(--text);}
  .day-tab.active{background:linear-gradient(135deg,var(--green2),var(--green3));border-color:transparent;color:#e8f8e0;}

  /* Meal card */
  .meal-card{background:rgba(255,255,255,0.02);border:1px solid var(--border);border-radius:14px;padding:1rem;margin-bottom:0.7rem;transition:border-color 0.2s;}
  .meal-card:hover{border-color:var(--border2);}
  .meal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0.4rem;}
  .meal-type{font-size:7px;letter-spacing:2px;text-transform:uppercase;background:rgba(126,203,90,0.1);color:var(--green);padding:2px 8px;border-radius:100px;}
  .meal-name{font-family:'Cormorant Garamond',serif;font-size:1rem;font-weight:600;color:var(--text);margin:0.3rem 0;}
  .meal-kcal{font-size:0.95rem;font-weight:700;color:var(--green);}
  .meal-macros{font-size:0.68rem;color:var(--muted);margin-bottom:0.4rem;}
  .aliment-tag{display:inline-block;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:6px;padding:2px 7px;margin:2px;font-size:0.68rem;}
  .aliment-qty{color:var(--green);font-weight:600;}

  /* Conseil */
  .conseil{border-left:2px solid var(--green2);padding:0.5rem 0.9rem;margin-bottom:0.5rem;background:rgba(126,203,90,0.03);border-radius:0 10px 10px 0;font-size:0.8rem;color:var(--text2);}

  /* Empty state */
  .empty{text-align:center;padding:4rem 2rem;color:var(--muted);}
  .empty-icon{font-size:3rem;margin-bottom:1rem;opacity:0.3;}
  .empty a{color:var(--green);text-decoration:none;}

  /* Loader */
  .page-loader{display:none;text-align:center;padding:4rem;color:var(--muted);}
  .page-loader.show{display:block;}
  .spinner{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem;}

  /* Animations */
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:900px){.layout{grid-template-columns:1fr;}.stats-row{grid-template-columns:repeat(3,1fr);}.charts-row{grid-template-columns:1fr;}}
  @media(max-width:500px){.stats-row{grid-template-columns:repeat(2,1fr);}}
</style>
</head>
<body>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrap">
  <div class="topbar">
    <div class="logo">◆ IA-NAHA</div>
    <a href="index.html">+ Nouveau plan</a>
  </div>

  <div class="page-header">
    <div class="badge">Dashboard</div>
    <h1>Mes plans <em>nutritionnels</em></h1>
  </div>

  <div class="page-loader" id="pageLoader">
    <div class="spinner"></div>
    Chargement des plans…
  </div>

  <div class="layout" id="mainLayout" style="display:none">
    <!-- Colonne gauche : liste -->
    <div>
      <div class="card">
        <div class="sec-title" id="planListTitle">Plans sauvegardés</div>
        <div id="planList">
          <div class="empty">
            <div class="empty-icon">◈</div>
            <p>Aucun plan trouvé.<br><a href="index.html">Générer mon premier plan →</a></p>
          </div>
        </div>
      </div>
    </div>

    <!-- Colonne droite : détail -->
    <div id="detailPanel">
      <div class="empty" style="padding:6rem 2rem">
        <div class="empty-icon">◆</div>
        <p style="color:var(--muted)">Sélectionne un plan pour voir le détail</p>
      </div>
    </div>
  </div>
</div>

<script>
const API_BASE = "http://localhost:8888/SD4/IA-NAHA/Application/api";
let currentPlanId = null;
let allPlans = [];

// Récupère user_id depuis l'URL
const params = new URLSearchParams(window.location.search);
const userId = params.get("user_id") || 1;

// ── Init ──────────────────────────────────────
window.addEventListener("DOMContentLoaded", () => loadPlans());

async function loadPlans() {
  document.getElementById("pageLoader").classList.add("show");
  try {
    const res  = await fetch(`${API_BASE}/get_plans.php?user_id=${userId}`);
    const data = await res.json();
    allPlans   = data.plans || [];

    document.getElementById("planListTitle").textContent =
      `Plans sauvegardés (${allPlans.length})`;

    renderPlanList(allPlans);

    // Sélectionne le premier plan automatiquement
    if (allPlans.length > 0) selectPlan(allPlans[0].id);

  } catch(e) {
    document.getElementById("planList").innerHTML =
      `<div class="empty"><p style="color:#f0a0a0">⚠ Erreur : ${e.message}</p></div>`;
  } finally {
    document.getElementById("pageLoader").classList.remove("show");
    document.getElementById("mainLayout").style.display = "grid";
  }
}

// ── Liste des plans ───────────────────────────
function renderPlanList(plans) {
  if (!plans.length) {
    document.getElementById("planList").innerHTML =
      `<div class="empty"><div class="empty-icon">◈</div><p>Aucun plan trouvé.<br><a href="index.html">Générer mon premier plan →</a></p></div>`;
    return;
  }
  document.getElementById("planList").innerHTML = plans.map(p => `
    <div class="plan-item" id="item-${p.id}" onclick="selectPlan(${p.id})">
      <div class="plan-date">Plan du ${formatDate(p.date_creation)}</div>
      <div class="plan-meta">${p.duree_jours}j · ${p.nb_repas || 0} repas · ${p.objectif || "objectif non défini"}</div>
      <div class="plan-macros">
        <div class="plan-macro"><div class="v">${p.calories_cibles}</div><div class="l">kcal</div></div>
        <div class="plan-macro"><div class="v" style="color:var(--prot)">${p.proteines_g}g</div><div class="l">prot</div></div>
        <div class="plan-macro"><div class="v" style="color:var(--gluc)">${p.glucides_g}g</div><div class="l">gluc</div></div>
        <div class="plan-macro"><div class="v" style="color:var(--lip)">${p.lipides_g}g</div><div class="l">lip</div></div>
      </div>
    </div>
  `).join("");
}

// ── Sélection d'un plan ───────────────────────
async function selectPlan(planId) {
  // Active l'item
  document.querySelectorAll(".plan-item").forEach(el => el.classList.remove("active"));
  const item = document.getElementById(`item-${planId}`);
  if (item) item.classList.add("active");

  currentPlanId = planId;
  document.getElementById("detailPanel").innerHTML =
    `<div class="page-loader show"><div class="spinner"></div>Chargement du plan…</div>`;

  try {
    const res  = await fetch(`${API_BASE}/get_plans.php?plan_id=${planId}`);
    const data = await res.json();
    renderDetail(data);
  } catch(e) {
    document.getElementById("detailPanel").innerHTML =
      `<div class="empty"><p style="color:#f0a0a0">⚠ ${e.message}</p></div>`;
  }
}

// ── Rendu du détail ───────────────────────────
function renderDetail(data) {
  const p    = data.plan;
  const jours = data.jours || {};
  const stats = data.stats_jours || [];

  const panel = document.getElementById("detailPanel");
  panel.innerHTML = `
    <div class="detail">

      <!-- Stats -->
      <div class="card">
        <div class="sec-title">Objectifs journaliers</div>
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-val" style="color:var(--green)">${p.calories_cibles}</div>
            <div class="stat-lbl">Calories / jour</div>
          </div>
          <div class="stat-card">
            <div class="stat-val" style="color:var(--green)">${p.bmr || "—"}</div>
            <div class="stat-lbl">BMR</div>
          </div>
          <div class="stat-card">
            <div class="stat-val" style="color:var(--prot)">${p.proteines_g}g</div>
            <div class="stat-lbl">Protéines</div>
          </div>
          <div class="stat-card">
            <div class="stat-val" style="color:var(--gluc)">${p.glucides_g}g</div>
            <div class="stat-lbl">Glucides</div>
          </div>
          <div class="stat-card">
            <div class="stat-val" style="color:var(--lip)">${p.lipides_g}g</div>
            <div class="stat-lbl">Lipides</div>
          </div>
        </div>
      </div>

      <!-- Charts -->
      <div class="charts-row">
        <div class="card">
          <div class="sec-title">Répartition macros</div>
          <div id="pieChart" style="text-align:center"></div>
        </div>
        <div class="card">
          <div class="sec-title">Calories par jour</div>
          <div class="bar-chart">
            <div class="bars" id="barsContainer"></div>
            <div class="cible-line">─── cible : ${p.calories_cibles} kcal</div>
          </div>
        </div>
      </div>

      <!-- Repas -->
      <div class="card">
        <div class="sec-title">Repas par jour</div>
        <div class="day-tabs" id="dayTabs">
          ${Object.keys(jours).map(j =>
            `<button class="day-tab ${j == 1 ? 'active' : ''}" onclick="switchDay(${j}, this)">Jour ${j}</button>`
          ).join("")}
        </div>
        <div id="mealsContainer"></div>
      </div>

    </div>
  `;

  // Pie
  renderPie(p.proteines_g, p.glucides_g, p.lipides_g, "pieChart");

  // Bars
  renderBars(stats, p.calories_cibles);

  // Repas jour 1
  window._jours = jours;
  renderMeals(jours, 1);
}

function switchDay(jour, btn) {
  document.querySelectorAll(".day-tab").forEach(t => t.classList.remove("active"));
  btn.classList.add("active");
  renderMeals(window._jours, jour);
}

function renderMeals(jours, jour) {
  const repas = jours[jour] || [];
  document.getElementById("mealsContainer").innerHTML = repas.map(r => `
    <div class="meal-card">
      <div class="meal-header">
        <div>
          <span class="meal-type">${(r.type_repas||"").replace("_"," ")}</span>
          <div class="meal-name">${r.nom}</div>
        </div>
        <div class="meal-kcal">${r.calories} kcal</div>
      </div>
      <div class="meal-macros">P: ${r.proteines}g · G: ${r.glucides}g · L: ${r.lipides}g · F: ${r.fibres}g</div>
      <div>
        ${(r.aliments||[]).map(a =>
          `<span class="aliment-tag">${a.nom} <span class="aliment-qty">${a.quantite_g}g</span></span>`
        ).join("")}
      </div>
    </div>
  `).join("") || `<div class="empty"><p>Aucun repas pour ce jour</p></div>`;
}

// ── PIE CHART ─────────────────────────────────
function renderPie(prot, gluc, lip, containerId) {
  const total = prot*4 + gluc*4 + lip*9;
  if (!total) return;
  const slices = [
    { pct:prot*4/total, color:"#4ade80", label:"Protéines" },
    { pct:gluc*4/total, color:"#facc15", label:"Glucides" },
    { pct:lip*9/total,  color:"#f97316", label:"Lipides" },
  ];
  let cumul=0, paths="";
  slices.forEach(({ pct, color }) => {
    const s = cumul*2*Math.PI - Math.PI/2;
    cumul += pct;
    const e = cumul*2*Math.PI - Math.PI/2;
    const r=40,cx=50,cy=50;
    const x1=cx+r*Math.cos(s), y1=cy+r*Math.sin(s);
    const x2=cx+r*Math.cos(e), y2=cy+r*Math.sin(e);
    paths += `<path d="M${cx},${cy} L${x1.toFixed(2)},${y1.toFixed(2)} A${r},${r} 0 ${pct>0.5?1:0},1 ${x2.toFixed(2)},${y2.toFixed(2)} Z" fill="${color}"/>`;
  });
  const legend = slices.map(s =>
    `<span style="color:${s.color};font-size:10px">● ${s.label} ${Math.round(s.pct*100)}%</span>`
  ).join(" ");
  document.getElementById(containerId).innerHTML = `
    <svg viewBox="0 0 100 100" width="140" height="140" style="display:block;margin:0 auto 10px">${paths}</svg>
    <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap">${legend}</div>
  `;
}

// ── BAR CHART ─────────────────────────────────
function renderBars(stats, cible) {
  if (!stats.length) return;
  const max = Math.max(...stats.map(s => s.calories), cible);
  document.getElementById("barsContainer").innerHTML = stats.map(s => `
    <div class="bar-wrap">
      <div class="bar-val">${s.calories}</div>
      <div class="bar" style="height:${(s.calories/max*100)}px"></div>
      <div class="bar-lbl">J${s.jour}</div>
    </div>
  `).join("");
}

// ── HELPERS ───────────────────────────────────
function formatDate(str) {
  if (!str) return "—";
  return new Date(str).toLocaleDateString("fr-FR", { day:"numeric", month:"long", year:"numeric" });
}
</script>
</body>
</html>
